<rect x="1262" y="548" width="228" height="32" rx="16.0" fill="rgba(255,255,255,0.03)" stroke="#FF8A8A" stroke-width="1.2"/><text x="1376.0" y="569.0" fill="#E6ECF5" font-size="13" font-weight="600" font-family="'JetBrains Mono','Noto Sans Mono CJK SC','Noto Sans Mono CJK TC','DejaVu Sans Mono',monospace" text-anchor="middle">review_pending → completed</text>
