<text x="112" y="772" fill="#9AAEC8" font-size="15" font-weight="400" font-family="'Inter','Noto Sans CJK SC','Noto Sans CJK TC','Microsoft YaHei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start">Telegram + WebUI show human-readable status only — no raw IDs or secrets.</text>
<text x="838" y="740" fill="#E6ECF5" font-size="20" font-weight="700" font-family="'Inter','Noto Sans CJK SC','Noto Sans CJK TC','Microsoft YaHei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start">Control invariant</text>
<text x="838" y="772" fill="#9AAEC8" font-size="15" font-weight="400" font-family="'Inter','Noto Sans CJK SC','Noto Sans CJK TC','Microsoft YaHei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start">Workers never touch SQLite directly. Every state move goes through the Runtime API.</text>
