  <g><rect x="104" y="154" width="1392" height="92" rx="28" fill="rgba(10,20,34,0.70)" stroke="rgba(255,255,255,0.10)"/><text x="132" y="194" fill="#F8FBFF" font-size="24" font-weight="700" font-family="Inter,Noto Sans CJK SC,Noto Sans CJK TC,Microsoft YaHei,PingFang SC,PingFang TC,Heiti TC,Arial Unicode MS,DejaVu Sans,sans-serif">One operational rail from task creation to visible completion</text><text x="132" y="221" fill="#79A1C4" font-size="15" font-weight="400" font-family="Inter,Noto Sans CJK SC,Noto Sans CJK TC,Microsoft YaHei,PingFang SC,PingFang TC,Heiti TC,Arial Unicode MS,DejaVu Sans,sans-serif"><tspan x="132" dy="0">The PM brain owns routing, workers stay dumb executors, and every handoff returns through the Runtime API with proof artifacts before delivery.</tspan></text></g>
  <text x="104" y="274" fill="#F8FBFF" font-size="38" font-weight="800" font-family="Inter,Noto Sans CJK SC,Noto Sans CJK TC,Microsoft YaHei,PingFang SC,PingFang TC,Heiti TC,Arial Unicode MS,DejaVu Sans,sans-serif">Nexus Dispatch · Control-Loop Product Flow</text>
  <text x="104" y="306" fill="#9CC7E8" font-size="18" font-weight="500" font-family="Inter,Noto Sans CJK SC,Noto Sans CJK TC,Microsoft YaHei,PingFang SC,PingFang TC,Heiti TC,Arial Unicode MS,DejaVu Sans,sans-serif"><tspan x="104" dy="0">From PM intent to verified delivery — one premium control-plane loop with visible proof at every stage.</tspan></text>
