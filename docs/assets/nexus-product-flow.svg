<text x="110" y="188" fill="#E6ECF5" font-size="25" font-weight="700" font-family="'Inter','Noto Sans CJK SC','Noto Sans CJK TC','Microsoft YaHei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start">One PM brain keeps the whole loop readable</text>
