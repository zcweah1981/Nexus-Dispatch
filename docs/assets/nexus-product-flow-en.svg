  <rect x="74" y="150" width="1452" height="78" rx="24" fill="rgba(16,24,39,0.78)" stroke="rgba(230,236,245,0.16)" stroke-width="1.6"/><text x="110" y="184" fill="#E6ECF5" font-size="23" font-weight="700" font-family="'Inter','Noto Sans CJK SC','Noto Sans CJK TC','Microsoft YaHei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start">One PM Brain keeps the whole loop on rails</text><text x="110" y="212" fill="#9AAEC8" font-size="15" font-weight="400" font-family="'Inter','Noto Sans CJK SC','Noto Sans CJK TC','Microsoft YaHei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start">Dependencies, lane routing, proof gates, and visible delivery stay inside one API-governed control plane.</text><path d="M349 432 L359 432" stroke="#76C4FF" stroke-width="4" marker-end="url(#arrowBlue)"/><path d="M632 432 L642 432" stroke="#4CD7A7" stroke-width="4" marker-end="url(#arrowGreen)"/><path d="M915 432 L925 432" stroke="#F3B54A" stroke-width="4" marker-end="url(#arrowAmber)"/><path d="M1198 432 L1208 432" stroke="#FF8A8A" stroke-width="4" marker-end="url(#arrowRose)"/><rect x="86" y="254" width="255" height="356" rx="30" fill="rgba(16,24,39,0.94)" stroke="#2F6BFF" stroke-width="1.6"/><rect x="96" y="264" width="235" height="336" rx="20" fill="none" stroke="rgba(255,255,255,0.06)"/><rect x="108" y="276" width="92" height="28" rx="14" fill="rgba(255,255,255,0.04)" stroke="#2F6BFF"/><text x="154" y="295" fill="#2F6BFF" font-size="12" font-weight="700" font-family="'JetBrains Mono','Noto Sans Mono CJK SC','Noto Sans Mono CJK TC','DejaVu Sans Mono',monospace" text-anchor="middle">STEP 01</text><circle cx="134" cy="346" r="28" fill="rgba(255,255,255,0.03)" stroke="#2F6BFF" stroke-width="1.8"/><text x="134" y="355" fill="#2F6BFF" font-size="24" font-weight="800" font-family="'JetBrains Mono','Noto Sans Mono CJK SC','Noto Sans Mono CJK TC','DejaVu Sans Mono',monospace" text-anchor="middle">1</text><text x="172" y="354" fill="#E6ECF5" font-size="24" font-weight="800" font-family="'Inter','Noto Sans CJK SC','Noto Sans CJK TC','Microsoft YaHei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start">Create Task</text><line x1="110" y1="384" x2="317" y2="384" stroke="rgba(255,255,255,0.08)"/><text x="114" y="430" fill="#9AAEC8" font-size="16" font-weight="400" font-family="'Inter','Noto Sans CJK SC','Noto Sans CJK TC','Microsoft YaHei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start"><tspan x="114" dy="0">PM defines lane, priority,</tspan><tspan x="114" dy="28">dependencies, and review</tspan><tspan x="114" dy="28">policy inside the runtime.</tspan></text><rect x="108" y="554" width="211" height="34" rx="17" fill="rgba(255,255,255,0.03)" stroke="#2F6BFF" stroke-width="1.2"/><text x="213.5" y="576" fill="#E6ECF5" font-size="13" font-weight="600" font-family="'JetBrains Mono','Noto Sans Mono CJK SC','Noto Sans Mono CJK TC','DejaVu Sans Mono',monospace" text-anchor="middle">created</text><rect x="369" y="254" width="255" height="356" rx="30" fill="rgba(16,24,39,0.94)" stroke="#76C4FF" stroke-width="1.6"/><rect x="379" y="264" width="235" height="336" rx="20" fill="none" stroke="rgba(255,255,255,0.06)"/><rect x="391" y="276" width="92" height="28" rx="14" fill="rgba(255,255,255,0.04)" stroke="#76C4FF"/><text x="437" y="295" fill="#76C4FF" font-size="12" font-weight="700" font-family="'JetBrains Mono','Noto Sans Mono CJK SC','Noto Sans Mono CJK TC','DejaVu Sans Mono',monospace" text-anchor="middle">STEP 02</text><circle cx="417" cy="346" r="28" fill="rgba(255,255,255,0.03)" stroke="#76C4FF" stroke-width="1.8"/><text x="417" y="355" fill="#76C4FF" font-size="24" font-weight="800" font-family="'JetBrains Mono','Noto Sans Mono CJK SC','Noto Sans Mono CJK TC','DejaVu Sans Mono',monospace" text-anchor="middle">2</text><text x="455" y="354" fill="#E6ECF5" font-size="24" font-weight="800" font-family="'Inter','Noto Sans CJK SC','Noto Sans CJK TC','Microsoft YaHei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start">Dispatch</text><line x1="393" y1="384" x2="600" y2="384" stroke="rgba(255,255,255,0.08)"/><text x="397" y="430" fill="#9AAEC8" font-size="16" font-weight="400" font-family="'Inter','Noto Sans CJK SC','Noto Sans CJK TC','Microsoft YaHei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start"><tspan x="397" dy="0">PM Brain resolves DAG order,</tspan><tspan x="397" dy="28">selects the worker lane,</tspan><tspan x="397" dy="28">and issues the run.</tspan></text><rect x="391" y="554" width="211" height="34" rx="17" fill="rgba(255,255,255,0.03)" stroke="#76C4FF" stroke-width="1.2"/><text x="496.5" y="576" fill="#E6ECF5" font-size="13" font-weight="600" font-family="'JetBrains Mono','Noto Sans Mono CJK SC','Noto Sans Mono CJK TC','DejaVu Sans Mono',monospace" text-anchor="middle">dispatched</text><rect x="652" y="254" width="255" height="356" rx="30" fill="rgba(16,24,39,0.94)" stroke="#4CD7A7" stroke-width="1.6"/><rect x="662" y="264" width="235" height="336" rx="20" fill="none" stroke="rgba(255,255,255,0.06)"/><rect x="674" y="276" width="92" height="28" rx="14" fill="rgba(255,255,255,0.04)" stroke="#4CD7A7"/><text x="720" y="295" fill="#4CD7A7" font-size="12" font-weight="700" font-family="'JetBrains Mono','Noto Sans Mono CJK SC','Noto Sans Mono CJK TC','DejaVu Sans Mono',monospace" text-anchor="middle">STEP 03</text><circle cx="700" cy="346" r="28" fill="rgba(255,255,255,0.03)" stroke="#4CD7A7" stroke-width="1.8"/><text x="700" y="355" fill="#4CD7A7" font-size="24" font-weight="800" font-family="'JetBrains Mono','Noto Sans Mono CJK SC','Noto Sans Mono CJK TC','DejaVu Sans Mono',monospace" text-anchor="middle">3</text><text x="738" y="354" fill="#E6ECF5" font-size="24" font-weight="800" font-family="'Inter','Noto Sans CJK SC','Noto Sans CJK TC','Microsoft YaHei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start">Worker Execute</text><line x1="676" y1="384" x2="883" y2="384" stroke="rgba(255,255,255,0.08)"/><text x="680" y="430" fill="#9AAEC8" font-size="16" font-weight="400" font-family="'Inter','Noto Sans CJK SC','Noto Sans CJK TC','Microsoft YaHei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start"><tspan x="680" dy="0">Worker claims the task,</tspan><tspan x="680" dy="28">executes the job, and</tspan><tspan x="680" dy="28">returns structured output.</tspan></text><rect x="674" y="554" width="211" height="34" rx="17" fill="rgba(255,255,255,0.03)" stroke="#4CD7A7" stroke-width="1.2"/><text x="779.5" y="576" fill="#E6ECF5" font-size="13" font-weight="600" font-family="'JetBrains Mono','Noto Sans Mono CJK SC','Noto Sans Mono CJK TC','DejaVu Sans Mono',monospace" text-anchor="middle">running</text><rect x="935" y="254" width="255" height="356" rx="30" fill="rgba(16,24,39,0.94)" stroke="#F3B54A" stroke-width="1.6"/><rect x="945" y="264" width="235" height="336" rx="20" fill="none" stroke="rgba(255,255,255,0.06)"/><rect x="957" y="276" width="92" height="28" rx="14" fill="rgba(255,255,255,0.04)" stroke="#F3B54A"/><text x="1003" y="295" fill="#F3B54A" font-size="12" font-weight="700" font-family="'JetBrains Mono','Noto Sans Mono CJK SC','Noto Sans Mono CJK TC','DejaVu Sans Mono',monospace" text-anchor="middle">STEP 04</text><circle cx="983" cy="346" r="28" fill="rgba(255,255,255,0.03)" stroke="#F3B54A" stroke-width="1.8"/><text x="983" y="355" fill="#F3B54A" font-size="24" font-weight="800" font-family="'JetBrains Mono','Noto Sans Mono CJK SC','Noto Sans Mono CJK TC','DejaVu Sans Mono',monospace" text-anchor="middle">4</text><text x="1021" y="354" fill="#E6ECF5" font-size="24" font-weight="800" font-family="'Inter','Noto Sans CJK SC','Noto Sans CJK TC','Microsoft YaHei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start">Proof + Artifact</text><line x1="959" y1="384" x2="1166" y2="384" stroke="rgba(255,255,255,0.08)"/><text x="963" y="430" fill="#9AAEC8" font-size="16" font-weight="400" font-family="'Inter','Noto Sans CJK SC','Noto Sans CJK TC','Microsoft YaHei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start"><tspan x="963" dy="0">Git SHA, files, images, and</tspan><tspan x="963" dy="28">completion payloads come back</tspan><tspan x="963" dy="28">through the same API boundary.</tspan></text><rect x="957" y="554" width="211" height="34" rx="17" fill="rgba(255,255,255,0.03)" stroke="#F3B54A" stroke-width="1.2"/><text x="1062.5" y="576" fill="#E6ECF5" font-size="13" font-weight="600" font-family="'JetBrains Mono','Noto Sans Mono CJK SC','Noto Sans Mono CJK TC','DejaVu Sans Mono',monospace" text-anchor="middle">completion_pending</text><rect x="1218" y="254" width="255" height="356" rx="30" fill="rgba(16,24,39,0.94)" stroke="#FF8A8A" stroke-width="1.6"/><rect x="1228" y="264" width="235" height="336" rx="20" fill="none" stroke="rgba(255,255,255,0.06)"/><rect x="1240" y="276" width="92" height="28" rx="14" fill="rgba(255,255,255,0.04)" stroke="#FF8A8A"/><text x="1286" y="295" fill="#FF8A8A" font-size="12" font-weight="700" font-family="'JetBrains Mono','Noto Sans Mono CJK SC','Noto Sans Mono CJK TC','DejaVu Sans Mono',monospace" text-anchor="middle">STEP 05</text><circle cx="1266" cy="346" r="28" fill="rgba(255,255,255,0.03)" stroke="#FF8A8A" stroke-width="1.8"/><text x="1266" y="355" fill="#FF8A8A" font-size="24" font-weight="800" font-family="'JetBrains Mono','Noto Sans Mono CJK SC','Noto Sans Mono CJK TC','DejaVu Sans Mono',monospace" text-anchor="middle">5</text><text x="1304" y="354" fill="#E6ECF5" font-size="24" font-weight="800" font-family="'Inter','Noto Sans CJK SC','Noto Sans CJK TC','Microsoft YaHei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start">Review + Delivery</text><line x1="1242" y1="384" x2="1449" y2="384" stroke="rgba(255,255,255,0.08)"/><text x="1246" y="430" fill="#9AAEC8" font-size="16" font-weight="400" font-family="'Inter','Noto Sans CJK SC','Noto Sans CJK TC','Microsoft YaHei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start"><tspan x="1246" dy="0">Policy accepts, rejects, or</tspan><tspan x="1246" dy="28">routes human review before</tspan><tspan x="1246" dy="28">visible verified delivery.</tspan></text><rect x="1240" y="554" width="211" height="34" rx="17" fill="rgba(255,255,255,0.03)" stroke="#FF8A8A" stroke-width="1.2"/><text x="1345.5" y="576" fill="#E6ECF5" font-size="13" font-weight="600" font-family="'JetBrains Mono','Noto Sans Mono CJK SC','Noto Sans Mono CJK TC','DejaVu Sans Mono',monospace" text-anchor="middle">review_pending → completed</text><rect x="86" y="700" width="680" height="132" rx="24" fill="rgba(16,24,39,0.72)" stroke="rgba(230,236,245,0.16)" stroke-width="1.6"/><rect x="812" y="700" width="702" height="132" rx="24" fill="rgba(16,24,39,0.72)" stroke="rgba(230,236,245,0.16)" stroke-width="1.6"/><text x="112" y="740" fill="#E6ECF5" font-size="20" font-weight="700" font-family="'Inter','Noto Sans CJK SC','Noto Sans CJK TC','Microsoft YaHei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start">Visible surfaces</text><text x="838" y="740" fill="#E6ECF5" font-size="20" font-weight="700" font-family="'Inter','Noto Sans CJK SC','Noto Sans CJK TC','Microsoft YaHei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start">Control invariant</text><text x="86" y="864" fill="rgba(230,236,245,0.55)" font-size="13" font-weight="400" font-family="'JetBrains Mono','Noto Sans Mono CJK SC','Noto Sans Mono CJK TC','DejaVu Sans Mono',monospace" text-anchor="start">Nexus Dispatch · proof-gated, API-only, PM-brain orchestration</text><text x="112" y="772" fill="#9AAEC8" font-size="15" font-weight="400" font-family="'Inter','Noto Sans CJK SC','Noto Sans CJK TC','Microsoft YaHei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start"><tspan x="112" dy="0">Telegram + WebUI show human-readable status only — no raw IDs or</tspan><tspan x="112" dy="22">secrets.</tspan></text><text x="838" y="772" fill="#9AAEC8" font-size="15" font-weight="400" font-family="'Inter','Noto Sans CJK SC','Noto Sans CJK TC','Microsoft YaHei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start"><tspan x="838" dy="0">Workers never touch SQLite directly. Every state move goes</tspan><tspan x="838" dy="22">through the Runtime API.</tspan></text>
