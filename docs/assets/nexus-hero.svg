    <text x="1258" y="526" fill="#FFF3D9" font-size="22" font-weight="700" font-family="'Inter', 'Segoe UI', Arial, sans-serif">WebUI</text>
    <text x="1258" y="553" fill="#F0C67D" font-size="14" font-family="'JetBrains Mono', 'DejaVu Sans Mono', monospace">read-only ops</text>
    <text x="1258" y="572" fill="#F0C67D" font-size="14" font-family="'JetBrains Mono', 'DejaVu Sans Mono', monospace">proof gallery</text>

    <path d="M1088 284V320H1018V334" stroke="#3DD5F3" stroke-width="3" stroke-linecap="round"/>
