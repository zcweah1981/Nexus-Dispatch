  <text x="104" y="252" fill="#F8FBFF" font-size="82" font-weight="700" font-family="'Inter', 'Segoe UI', Arial, sans-serif">Nexus Dispatch</text>
  <text x="104" y="326" fill="#9CC7E8" font-size="32" font-weight="500" font-family="'Inter', 'Segoe UI', Arial, sans-serif">Single PM brain. API-only runtime. Multi-agent execution at control-plane scale.</text>
  <text x="104" y="390" fill="#79A1C4" font-size="21" font-family="'Inter', 'Segoe UI', Arial, sans-serif">Telegram orchestration, Runtime API, SQLite SSoT, daemon tick loop, proof artifacts, WebUI observability, and project-scoped cron governance — in one productized dispatch surface.</text>

  <g>
    <rect x="104" y="458" width="208" height="52" rx="26" fill="#0E2238" stroke="#1D4868"/>
    <text x="136" y="491" fill="#E7F4FF" font-size="18" font-weight="600" font-family="'Inter', 'Segoe UI', Arial, sans-serif">API-only Runtime Core</text>
