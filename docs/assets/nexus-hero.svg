  <rect x="0" y="0" width="1600" height="900" fill="url(#glowCyan)"/>
  <rect x="0" y="0" width="1600" height="900" fill="url(#glowViolet)"/>

  <g opacity="0.7">
    <path d="M104 151H352" stroke="#1E3A5F" stroke-width="2"/>
