    <text x="1156" y="403" fill="#B3A4E7" font-size="14" font-family="'JetBrains Mono', 'DejaVu Sans Mono', monospace">SSoT state</text>
    <text x="1156" y="422" fill="#B3A4E7" font-size="14" font-family="'JetBrains Mono', 'DejaVu Sans Mono', monospace">inside API only</text>

