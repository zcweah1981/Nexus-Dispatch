  <text x="86" y="120" fill="#9AAEC8" font-size="16" font-weight="400" font-family="'JetBrains Mono','Noto Sans Mono CJK SC','Noto Sans Mono CJK TC','DejaVu Sans Mono',monospace" text-anchor="start">單一 PM 大腦、API-only 資料流、證據門控交付，以及 Telegram 與 WebUI 的全程可見。</text>
