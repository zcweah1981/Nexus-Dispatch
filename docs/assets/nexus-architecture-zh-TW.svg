280" y="936" fill="#9AAEC8" font-size="14" font-weight="400" font-family="'Inter','Noto Sans CJK SC','Noto Sans CJK TC','Microsoft YaHei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start"><tspan x="280" dy="0">任何狀態變化都必須經過 Runtime API；Worker、WebUI、Daemon 都不能繞過 API 直寫資料庫。</tspan></text><text x="1038" y="936" fill="#9AAEC8" font-size="14" font-weight="400" font-family="'Inter','Noto Sans CJK SC','Noto Sans CJK TC','Microsoft YaHei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start"><tspan x="1038" dy="0">Worker 結果 → proof 審核 → 驗證交付 → Telegram/WebUI 可見。</tspan></text>
