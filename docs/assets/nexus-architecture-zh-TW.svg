Hei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start">Proof / Review 平面</text><text x="112" y="798" fill="#9AAEC8" font-size="16" font-weight="400" font-family="'Inter','Noto Sans CJK SC','Noto Sans CJK TC','Microsoft YaHei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start"><tspan x="112" dy="0">• 交付物證據</tspan><tspan x="112" dy="28">• 機器門控 + 審核結論</tspan></text><rect x="544" y="708" width="410" height="152" rx="30" fill="rgba(16,24,39,0.94)" stroke="#9AAEC8" stroke-width="1.6"/><rect x="554" y="718" width="390" height="132" rx="20" fill="none" stroke="rgba(255,255,255,0.06)"/><rect x="566" y="730" width="92" height="28" rx="14" fill="rgba(255,255,255,0.04)" stroke="#9AAEC8"/><text x="612" y="749" fill="#9AAEC8" font-size="12" font-weight="700" font-family="'JetBrains Mono','Noto Sans Mono CJK SC','Noto Sans Mono CJK TC','DejaVu Sans Mono',monospace" text-anchor="middle">SSOT</text><text x="570" y="792" fill="#E6ECF5" font-size="24" font-weight="800" font-family="'Inter','Noto Sans CJK SC','Noto Sans CJK TC','Microsoft YaHei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start">SQLite SSoT</text><text x="572" y="830" fill="#9AAEC8" font-size="16" font-weight="400" font-family="'Inter','Noto Sans CJK SC','Noto Sans CJK TC','Microsoft YaHei','PingFang SC','PingFang TC','DejaVu Sans',sans-serif" text-anchor="start"><tspan x="572" dy="0">• 僅 API 行程內部可見</tspan><tspan x="572" dy="28">• Prisma DAL</tspan><tspan x="572" dy="28">• 單一真相源</tspan></text><rect x="1034" y="676" width="482" height="184" rx="30" fill="rgba(16,24,39,0.94)" stroke="#FF8A8A" stroke-width="1.6"/><rect x="1044" y="686" width="462" height="164" rx="20" fill="none" stroke="rgba(255,255,255,0.06)"/><rect x="1056" y="698" width="92" height="28" rx="14" fill="rgba(255,255,255,0.04)" stroke="#FF8A8A"/><text x="1102" y="717" fill="#FF8A8A" font-size="12" font-weight="700" font-family="'JetBrains Mono','Noto Sans Mono CJK SC','Noto Sans Mono CJ