version: "3.8"

services:
  nexus-db:
    image: alpine:latest
    command: ["tail", "-f", "/dev/null"]
    volumes:
      - ./data:/data
    networks:
      - nexus-internal

  nexus-api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///data/nexus.db}
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_jwt_key}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/data
    networks:
      - nexus-internal
    depends_on:
      - nexus-db

  nexus-daemon:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///data/nexus.db}
    volumes:
      - .:/app
      - ./data:/data
    networks:
      - nexus-internal
    depends_on:
      - nexus-db

  nexus-webui:
    image: nginx:alpine
    ports:
      - "3030:80"
    volumes:
      - ./src/webui/dist:/usr/share/nginx/html:ro
    networks:
      - nexus-internal

networks:
  nexus-internal:
    driver: bridge
